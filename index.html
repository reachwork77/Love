<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Bot Control Center</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #0088cc; text-align: center; margin-bottom: 20px; }
        .info-box { background: #e7f3ff; padding: 10px; border-radius: 6px; font-size: 0.85em; margin-bottom: 20px; border-left: 5px solid #0088cc; overflow-wrap: break-word; }
        label { font-weight: bold; display: block; margin: 10px 0 5px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #0088cc; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #0077b5; }
        #status { margin-top: 15px; text-align: center; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>Bot Controller</h2>
    
    <div class="info-box">
        <strong>Active Token:</strong><br>
        8041664147:AAF8SEZD3WUzX2wLBbMzc5V4nQKStkNS_sM
    </div>

    <label for="chatId">Target Chat ID</label>
    <input type="text" id="chatId" placeholder="e.g. 123456789">

    <label for="message">Message Text</label>
    <textarea id="message" rows="4" placeholder="Type your broadcast message here..."></textarea>

    <button onclick="sendMessage()">Send via Telegram API</button>

    <div id="status"></div>
</div>

<script>
    async function sendMessage() {
        const token = "8041664147:AAF8SEZD3WUzX2wLBbMzc5V4nQKStkNS_sM";
        const chatId = document.getElementById('chatId').value;
        const message = document.getElementById('message').value;
        const statusDiv = document.getElementById('status');

        if (!chatId || !message) {
            statusDiv.style.color = "red";
            statusDiv.innerText = "Please fill in all fields.";
            return;
        }

        statusDiv.style.color = "orange";
        statusDiv.innerText = "Sending...";

        const url = `https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(message)}`;

        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.ok) {
                statusDiv.style.color = "green";
                statusDiv.innerText = "Message sent successfully!";
            } else {
                statusDiv.style.color = "red";
                statusDiv.innerText = "Error: " + data.description;
            }
        } catch (error) {
            statusDiv.style.color = "red";
            statusDiv.innerText = "Failed to connect to API.";
        }
    }
</script>

</body>
</html>
